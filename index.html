<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💬 Assistant IA</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0c14; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; min-height: 100vh; transition: 0.3s; }

  .container { width: 100%; max-width: 720px; height: 100vh; display: flex; flex-direction: column; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a1d2e, #12151f);
    border-bottom: 1px solid #1f2338;
    padding: 16px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #6c63ff, #a855f7); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }

  .header-info h1 { font-size: 17px; color: #e2e8f0; font-weight: 700; }
  .header-info p  { font-size: 12px; color: #4ade80; margin-top: 2px; }

  .status-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }

  .header-actions { display: flex; gap: 12px; }
  .header-actions button {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid #1f2338;
    background: #1a1d2e;
    color: #e2e8f0;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
  }
  .header-actions button:hover { transform: scale(1.1); background: #2a2d40; }

  /* MESSAGES */
  .messages { flex: 1; overflow-y: auto; padding: 22px 18px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-thumb { background: #2e3150; border-radius: 10px; }

  .msg { display: flex; gap: 10px; align-items: flex-end; max-width: 88%; animation: fadeUp 0.25s ease; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.bot  { align-self: flex-start; }

  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .msg.bot  .msg-avatar { background: linear-gradient(135deg, #6c63ff, #a855f7); }
  .msg.user .msg-avatar { background: linear-gradient(135deg, #0ea5e9, #06b6d4); }

  .bubble { padding: 11px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; color: #e2e8f0; max-width: 100%; word-wrap: break-word; }
  .msg.bot  .bubble { background: #1a1d2e; border-bottom-left-radius: 4px; border: 1px solid #1f2338; }
  .msg.user .bubble { background: linear-gradient(135deg, #6c63ff, #a855f7); border-bottom-right-radius: 4px; color: #fff; }

  .timestamp { font-size: 10px; color: #3a3f5c; margin-top: 3px; }
  .msg.user .timestamp { text-align: right; }

  .typing { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
  .typing span { width: 7px; height: 7px; background: #6c63ff; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  /* INPUT */
  .input-area { background: #12151f; border-top: 1px solid #1f2338; padding: 14px 18px; display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; background: #1a1d2e; color: #e2e8f0; border: 1px solid #1f2338; border-radius: 14px; padding: 11px 16px; font-size: 14px; font-family: inherit; resize: none; outline: none; max-height: 120px; min-height: 44px; line-height: 1.5; transition: border-color 0.2s; }
  textarea:focus { border-color: #6c63ff; }
  textarea::placeholder { color: #3a3f5c; }

  .send-btn { width: 44px; height: 44px; background: linear-gradient(135deg, #6c63ff, #a855f7); border: none; border-radius: 50%; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; flex-shrink: 0; }
  .send-btn:hover { transform: scale(1.08); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* CODE BLOCKS */
  pre { background: #0d0f1a; border-radius: 8px; padding: 10px; overflow-x: auto; font-size: 12px; margin-top: 6px; border: 1px solid #1f2338; }
  code { font-family: monospace; color: #a5f3fc; }
  strong { color: #a5b4fc; }

  /* ANIMATIONS */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
  @keyframes pulse  { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* 🌞 MODE CLAIR */
  body.light { background: #f2f2f7; }
  .light .header { background: #ffffff; border-color: #d1d5db; }
  .light .header-actions button { background: #ffffff; border-color: #d1d5db; color: #1e293b; }
  .light textarea { background: #ffffff; color: #1e293b; border-color: #d1d5db; }
  .light .input-area { background: #ffffff; border-color: #d1d5db; }
  .light .msg.bot .bubble { background: #e5e7eb; border-color: #d1d5db; color: #1e293b; }
  .light .bubble { color: #1e293b; }
  .light .messages::-webkit-scrollbar-thumb { background: #cbd5e1; }
</style>
</head>

<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="avatar">🤖</div>

    <div class="header-info">
      <h1>Assistant IA</h1>
      <p><span class="status-dot"></span>En ligne · Propulsé par Groq · Llama 3.3</p>
    </div>

    <div class="header-actions">
      <button class="theme-btn" onclick="toggleTheme()" title="Changer le thème">🌙</button>
      <button class="trash-btn" onclick="clearChat()" title="Effacer la conversation">🗑</button>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages"></div>

  <!-- INPUT -->
  <div class="input-area">
    <textarea id="input" placeholder="Écrivez votre message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

</div>

<script>
const API_KEY = "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";

const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('input');
const sendBtn    = document.getElementById('sendBtn');

let history = [
  { role: "system", content: "Tu es un assistant IA intelligent, sympathique et très utile. Tu réponds en français sauf si l'utilisateur écrit dans une autre langue." }
];

let typingEl = null;

function now() {
  return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function formatText(text) {
  return text
    .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function addMessage(role, text) {
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = `msg ${isUser ? 'user' : 'bot'}`;
  div.innerHTML = `
    <div class="msg-avatar">${isUser ? '👤' : '🤖'}</div>
    <div>
      <div class="bubble">${formatText(text)}</div>
      <div class="timestamp">${now()}</div>
    </div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  typingEl = document.createElement('div');
  typingEl.className = 'msg bot';
  typingEl.innerHTML = `<div class="msg-avatar">🤖</div><div class="bubble typing"><span></span><span></span><span></span></div>`;
  messagesEl.appendChild(typingEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  autoResize(inputEl);
  sendBtn.disabled = true;

  addMessage('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${API_KEY}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: history,
        max_tokens: 1024,
        temperature: 0.7
      })
    });

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content?.trim() || "Désolé, je n'ai pas pu répondre.";

    hideTyping();
    addMessage('bot', reply);
    history.push({ role: 'assistant', content: reply });

  } catch(e) {
    hideTyping();
    addMessage('bot', '❌ Erreur : ' + e.message);
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function clearChat() {
  history = [history[0]];
  messagesEl.innerHTML = '';
  addMessage('bot', '🗑 Conversation effacée ! Comment puis-je vous aider ?');
}

/* 🌗 MODE JOUR/NUIT */
function toggleTheme() {
  document.body.classList.toggle("light");
  const btn = document.querySelector(".theme-btn");
  btn.textContent = document.body.classList.contains("light") ? "☀️" : "🌙";
}

/* Message de bienvenue */
addMessage('bot', '👋 Bonjour ! Je suis votre assistant IA .\nJe peux vous aider à coder, rédiger, expliquer, traduire et bien plus encore ! 😊');
</script>

</body>
</html>
